<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜YTA WEB</title>
<meta name="description" content="YTA WEB へのお問い合わせフォーム。制作費15万円・月額3,980円・縛りなしのHP制作サービスについてお気軽にご相談ください。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231f3a5f'/%3E%3Ctext x='50' y='72' text-anchor='middle' font-family='Arial,sans-serif' font-size='64' font-weight='700' fill='white'%3EY%3C/text%3E%3C/svg%3E">
<style>
.contact-form {
    max-width: 640px;
    margin: 0 auto;
}
.contact-form .form-group {
    margin-bottom: 24px;
}
.contact-form label {
    display: block;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--color-primary);
    font-size: 15px;
}
.contact-form label .required {
    color: #c62828;
    font-size: 13px;
    margin-left: 6px;
}
.contact-form input[type="text"],
.contact-form input[type="email"],
.contact-form textarea {
    width: 100%;
    padding: 12px 14px;
    font-size: 16px;
    font-family: inherit;
    border: 1px solid var(--color-border);
    border-radius: 4px;
    background: white;
    transition: border-color 0.15s ease;
}
.contact-form input:focus,
.contact-form textarea:focus {
    outline: none;
    border-color: var(--color-primary);
}
.contact-form textarea {
    min-height: 160px;
    resize: vertical;
}
.contact-form .form-help {
    font-size: 13px;
    color: var(--color-text-muted);
    margin-top: 4px;
}
.contact-form .submit-area {
    text-align: center;
    margin-top: 32px;
}
.contact-form button[type="submit"] {
    padding: 14px 56px;
    font-size: 16px;
}
.contact-form .hp-field {
    position: absolute;
    left: -9999px;
    width: 1px;
    height: 1px;
    overflow: hidden;
}
</style>
</head>
<body>

<header>
    <div class="container">
        <div class="logo"><a href="index.html">YTA WEB</a></div>
        <nav>
            <ul>
                <li><a href="service.html">サービス</a></li>
                <li><a href="pricing.html">料金</a></li>
                <li><a href="flow.html">流れ</a></li>
                <li><a href="samples.html">サンプル</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="contact.html" class="active">お問い合わせ</a></li>
            </ul>
        </nav>
    </div>
</header>

<div class="page-title">
    <div class="container">
        <h1>お問い合わせ</h1>
        <p>ご質問・ご相談を以下のフォームからお気軽にお送りください。</p>
    </div>
</div>

<section>
    <div class="container">
        <div class="contact-form">
            <form action="https://formspree.io/f/maqvadkd" method="POST">
                <input type="hidden" name="_subject" value="YTA WEB お問い合わせ">
                <div class="hp-field" aria-hidden="true">
                    <label for="hp-field">この項目は入力しないでください</label>
                    <input type="text" id="hp-field" name="_gotcha" tabindex="-1" autocomplete="off">
                </div>

                <div class="form-group">
                    <label for="name">お名前 <span class="required">必須</span></label>
                    <input type="text" id="name" name="name" required placeholder="山田 太郎">
                </div>

                <div class="form-group">
                    <label for="company">会社名・屋号 <span class="required">必須</span></label>
                    <input type="text" id="company" name="company" required placeholder="株式会社○○ / ○○商店">
                </div>

                <div class="form-group">
                    <label for="email">メールアドレス <span class="required">必須</span></label>
                    <input type="email" id="email" name="email" required placeholder="example@example.com">
                    <p class="form-help">ご返信用のメールアドレスをご入力ください。</p>
                </div>

                <div class="form-group">
                    <label for="message">お問い合わせ内容 <span class="required">必須</span></label>
                    <textarea id="message" name="message" required placeholder="ご質問・ご相談の内容をご記入ください。"></textarea>
                </div>

                <div class="submit-area">
                    <button type="submit" class="cta">送信する</button>
                </div>
            </form>
        </div>
    </div>
</section>

<section class="alt">
    <div class="container">
        <h2>お問い合わせの前に</h2>
        <p class="lead">よくある質問は FAQ ページに掲載しています。先にご確認いただくとスムーズです。</p>
        <div class="cta-group" style="text-align:center;">
            <a href="faq.html" class="cta cta-secondary">FAQ を見る</a>
            <a href="pricing.html" class="cta cta-secondary">料金を見る</a>
        </div>
    </div>
</section>

<footer>
    <div class="container">
        <div class="footer-logo">YTA WEB</div>
        <div class="footer-nav">
            <a href="service.html">サービス</a>
            <a href="pricing.html">料金</a>
            <a href="flow.html">流れ</a>
            <a href="samples.html">サンプル</a>
            <a href="faq.html">FAQ</a>
            <a href="contact.html">お問い合わせ</a>
            <a href="tokushoho.html">特定商取引法に基づく表記</a>
            <a href="privacy.html">プライバシーポリシー</a>
        </div>
        <div class="copyright">
            &copy; 2025 YTA WEB
        </div>
    </div>
</footer>

</body>
</html>
